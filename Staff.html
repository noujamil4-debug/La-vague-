<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAFF - La Vague</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00d4ff; --bg: #00050a; --card: #0a1120; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin:0; padding:0; }
        .header { background: #000; padding: 20px; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .profit-btn { position: fixed; left: 0; top: 50%; background: var(--neon); color: #000; padding: 15px 10px; border-radius: 0 15px 15px 0; font-weight: 900; writing-mode: vertical-lr; cursor: pointer; z-index: 1001; box-shadow: 0 0 15px var(--neon); }
        .tabs { display: flex; background: #001226; padding: 5px; margin: 20px auto; width: 90%; max-width: 500px; border-radius: 50px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 50px; background: transparent; color: #fff; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--neon); color: #000; }
        .container { max-width: 800px; margin: 0 auto; padding: 0 15px 100px 15px; }
        .order-card { background: var(--card); margin-bottom: 20px; padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); animation: fadeIn 0.4s; }
        .phone-link { color: var(--neon); font-weight: 900; font-size: 1.3rem; text-decoration: none; display: block; margin: 10px 0; }
        .items-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; margin: 10px 0; }
        .btn-done { background: #15803d; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        @keyframes ring { 0% {transform: rotate(0)} 20% {transform: rotate(15deg)} 40% {transform: rotate(-15deg)} 60% {transform: rotate(0)} }
        .ringing { animation: ring 0.4s infinite; }
        @keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }
    </style>
</head>
<body>
    <div class="profit-btn" onclick="showProfit()">P R O F I T S</div>
    <div class="header">
        <div style="font-weight:900; color:var(--neon); font-style:italic; letter-spacing:2px;">LA VAGUE STAFF</div>
        <i class="fas fa-bell" id="bellIcon" style="font-size:1.8rem; color:var(--neon);"></i>
    </div>
    <div class="tabs">
        <button class="tab-btn active" id="btnLive" onclick="setTab('pending')">LIVE</button>
        <button class="tab-btn" id="btnDone" onclick="setTab('done')">ARCHIVES</button>
    </div>
    <div class="container" id="ordersList"></div>
    <audio id="bellSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        // --- ضع بياناتك هنا لكي يرى العمال نفس قاعدة بيانات الزبائن ---
        const SB_URL = 'https://jtwiuurduechpnajormb.supabase.co';
        const SB_KEY = 'الصق_هنا_مفتاح_ANON_الخاص_بك';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let currentTab = 'pending';

        async function fetchOrders() {
            const { data } = await sb.from('orders').select('*').eq('status', currentTab).order('created_at', { ascending: false });
            document.getElementById('ordersList').innerHTML = data.map(o => `
                <div class="order-card">
                    <div style="display:flex; justify-content:space-between;">
                        <b>Client: ${o.customer_name}</b>
                        <b style="color:var(--neon)">${o.total_price} DA</b>
                    </div>
                    <a href="tel:${o.phone}" class="phone-link"><i class="fas fa-phone-alt"></i> ${o.phone}</a>
                    <div style="opacity:0.6; font-size:0.9rem;">${o.city} | ${new Date(o.created_at).toLocaleTimeString()}</div>
                    <div class="items-box">${o.items.map(i => `<div>• ${i.name} (${i.price} DA)</div>`).join('')}</div>
                    <div style="display:flex; gap:10px;">
                        <a href="https://maps.google.com?q=${o.gps_coords}" target="_blank" style="flex:1; background:#fff; color:#000; text-align:center; padding:15px; border-radius:10px; text-decoration:none; font-weight:bold;">VOIR GPS</a>
                        ${currentTab === 'pending' ? `<button class="btn-done" style="flex:1;" onclick="markDone('${o.id}')">LIVRÉ</button>` : ''}
                    </div>
                </div>`).join('');
        }

        async function markDone(id) { await sb.from('orders').update({ status: 'done' }).eq('id', id); fetchOrders(); }
        
        function setTab(t) { 
            currentTab = t; 
            document.getElementById('btnLive').classList.toggle('active', t==='pending'); 
            document.getElementById('btnDone').classList.toggle('active', t==='done'); 
            fetchOrders(); 
        }

        async function showProfit() {
            const { data } = await sb.from('orders').select('total_price').eq('status', 'done');
            const total = data.reduce((s, o) => s + Number(o.total_price), 0);
            alert("Chiffre d'affaires total: " + total + " DA");
        }

        // الاستماع للطلبات الجديدة (الجرس يرن 3 مرات)
        sb.channel('orders-realtime').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'orders' }, () => {
            const icon = document.getElementById('bellIcon');
            const audio = document.getElementById('bellSound');
            icon.classList.add('ringing');
            let c = 0;
            let i = setInterval(() => { audio.currentTime=0; audio.play(); c++; if(c>=3){ clearInterval(i); icon.classList.remove('ringing'); } }, 1000);
            fetchOrders();
        }).subscribe();

        fetchOrders();
    </script>
</body>
</html>
